<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Resume Analyzer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; }
    .hero { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 40px 0; }
    .card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .btn-analyze { background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: white; padding: 12px 40px; border-radius: 30px; font-weight: 600; }
    .btn-analyze:hover { opacity: 0.9; color: white; }
    .result-box { background: white; border-radius: 16px; padding: 30px; white-space: pre-wrap; line-height: 1.8; }
  </style>
</head>
<body>

<div class="hero text-center mb-5">
  <h1 class="fw-bold">🤖 AI Resume Analyzer</h1>
  <p class="lead">Upload your resume and get instant AI-powered feedback</p>
</div>

<div class="container pb-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card p-4 mb-4">
        <form method="POST" enctype="multipart/form-data">
          {% csrf_token %}

          <div class="mb-4">
            <label class="form-label fw-semibold">📄 Upload Resume (PDF)</label>
            <input type="file" name="resume_file" accept=".pdf" class="form-control">
            <div class="text-center my-2 text-muted">— OR —</div>
            <label class="form-label fw-semibold">📝 Paste Resume Text</label>
            <textarea name="resume_text" class="form-control" rows="6" placeholder="Paste your resume content here..."></textarea>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">💼 Job Description</label>
            <textarea name="job_desc" class="form-control" rows="4" placeholder="Paste the job description you're applying for..."></textarea>
          </div>

          <div class="text-center">
            <button type="submit" class="btn btn-analyze btn-lg">🔍 Analyze Resume</button>
          </div>
        </form>
      </div>

      {% if error %}
        <div class="alert alert-danger rounded-4">⚠️ {{ error }}</div>
      {% endif %}

      {% if result %}
        <div class="card p-4">
          <h4 class="fw-bold mb-3">📊 Analysis Result</h4>
          <div class="result-box">{{ result }}</div>
        </div>
      {% endif %}

    </div>
  </div>
</div>

</body>
</html>
